version: "3.9"

services:
  backend:
    build: ./mysite
    container_name: django_backend
    volumes:
      - ./mysite:/app
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: react_frontend
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
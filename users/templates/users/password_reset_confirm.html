{% extends "users/layout.html" %}
{% block content %}
<h1 class="text-center mb-4">Встановіть новий пароль</h1>
<div class="row">
  <div class="col-md-6 offset-md-3">
    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-success w-100">Зберегти пароль</button>
    </form>
  </div>
</div>
{% endblock %}

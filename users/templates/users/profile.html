{% extends "users/layout.html" %}

{% block title %}Профіль{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="mb-4 text-center">Мій профіль</h2>

    <ul class="list-group mb-3">
        <li class="list-group-item"><strong>Логін:</strong> {{ user.username }}</li>
        <li class="list-group-item"><strong>Email:</strong> {{ user.email }}</li>
        <li class="list-group-item"><strong>Ім'я:</strong> {{ user.first_name }}</li>
        <li class="list-group-item"><strong>Прізвище:</strong> {{ user.last_name }}</li>
    </ul>

    <div class="text-center">
        <a href="{% url 'edit_profile' %}" class="btn btn-primary">Редагувати профіль</a>
    </div>
</div>
{% endblock %}

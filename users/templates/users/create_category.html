{% extends 'users/layout.html' %}
{% load static %}

{% block mystyles %}
<link href="{% static 'css/cropper.css' %}" rel="stylesheet" />
{% endblock %}

{% block content %}
<h1 class="text-center mb-4">Додати категорію</h1>

<div class="row">
  <form class="col-md-6 offset-md-3 needs-validation" method="post" enctype="multipart/form-data" novalidate>
    {% csrf_token %}

    <div class="mb-3">
      <label for="name" class="form-label">Назва</label>
      <input type="text" class="form-control" id="name" name="name" required />
      <div class="invalid-feedback">Введіть назву категорії</div>
    </div>

    <div class="mb-3 text-center">
      <label for="image" style="cursor: pointer;">
        <img src="{% static 'images/noimage.jpg' %}" id="imgView" width="200" class="rounded shadow" />
      </label>

      <input type="file" id="image" name="image" accept="image/*" style="display:none;" required />

      <div class="invalid-feedback d-block" id="imageError" style="display:none;">
        Завантажте картинку
      </div>
    </div>

    <div class="form-check mb-3">
      <input type="checkbox" class="form-check-input" id="is_active" name="is_active" checked />
      <label for="is_active" class="form-check-label">Активна</label>
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Опис</label>
      <textarea name="description" id="description" class="form-control" required></textarea>
      <div class="invalid-feedback">Опис не може бути порожнім</div>
    </div>

    <button type="submit" class="btn btn-primary w-100">Додати</button>
  </form>
</div>

<div class="modal fade" id="exampleModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Редагування фото</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <img src="" id="imagePreview" style="width:100%;" />
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрити</button>
        <button type="button" id="btnCroppedImage" class="btn btn-primary">Зберегти</button>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="{% static 'js/cropper.js' %}"></script>

<script src="https://cdn.tiny.cloud/1/9m9a3vb8bfybjrhuptnpiwc22mtmshlgslqjqqgajkl2rxkg/tinymce/8/tinymce.min.js"
        referrerpolicy="origin"></script>

<script>
tinymce.init({
    selector: '#description',
    height: 300
});
</script>

<script>
window.addEventListener('load', () => {

    const form = document.querySelector('form');
    const imageInput = document.getElementById('image');
    const imgView = document.getElementById('imgView');
    const imagePreview = document.getElementById('imagePreview');
    const btnCroppedImage = document.getElementById('btnCroppedImage');
    const imageError = document.getElementById('imageError');

    const modalEl = document.getElementById('exampleModal');
    const exampleModal = new bootstrap.Modal(modalEl);

    let cropper;

    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        imagePreview.src = URL.createObjectURL(file);
        exampleModal.show();
    });

    modalEl.addEventListener('shown.bs.modal', () => {
        cropper = new Cropper(imagePreview, {
            autoCropArea: 0.8,
        });
    });

    modalEl.addEventListener('hidden.bs.modal', () => {
        if (cropper) {
            cropper.destroy();
            cropper = null;
        }
    });

    btnCroppedImage.addEventListener('click', () => {
        if (!cropper) return;

        cropper.getCroppedCanvas().toBlob(blob => {
            const file = new File([blob], crypto.randomUUID() + '.png', {
                type: 'image/png'
            });

            const dt = new DataTransfer();
            dt.items.add(file);
            imageInput.files = dt.files;

            imgView.src = URL.createObjectURL(file);
            imageError.style.display = 'none';

            exampleModal.hide();
        });
    });

    form.addEventListener('submit', (event) => {

        // TinyMCE sync
        tinymce.triggerSave();

        let valid = form.checkValidity();

        // перевірка картинки
        if (!imageInput.files.length) {
            valid = false;
            imageError.style.display = 'block';
        }

        if (!valid) {
            event.preventDefault();
            event.stopPropagation();
        }

        form.classList.add('was-validated');
    });
});
</script>

{% endblock %}

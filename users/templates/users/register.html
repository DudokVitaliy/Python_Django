{% extends "users/layout.html" %}

{% block title %}Реєстрація{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="mb-4 text-center">Реєстрація</h2>

    <div id="success-msg" class="alert alert-success" style="display:none;">
        Користувач успішно зареєстрований!
    </div>

    <div id="error-msg" class="alert alert-danger" style="display:none;"></div>
    
    <form id="registerForm" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Логін</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" name="password1" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Підтвердження пароля</label>
            <input type="password" name="password2" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Аватар</label>
            <input type="file" name="avatar" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary w-100">Зареєструватися</button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const form = e.target;

    const formData = new FormData();

    formData.append('username', form.username.value);
    formData.append('email', form.email.value);
    formData.append('password', form.password1.value);

    // файл
    if (form.avatar.files.length > 0) {
        formData.append('avatar', form.avatar.files[0]);
    }

    try {
        const response = await fetch("{% url 'api_register' %}", {
            method: "POST",
            headers: {
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: formData
        });

        if (response.ok) {
            document.getElementById('success-msg').style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';
            form.reset();
        } else {
            const result = await response.json();
            document.getElementById('error-msg').innerText = JSON.stringify(result);
            document.getElementById('error-msg').style.display = 'block';
        }
    } catch (err) {
        document.getElementById('error-msg').innerText = 'Помилка при відправці запиту.';
        document.getElementById('error-msg').style.display = 'block';
    }
});
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Сайт{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block mystyles %}{% endblock %}
</head>
<body>

<div class="container mt-5">

    <div class="mb-4">
        {% if user.is_authenticated %}
            <a href="{% url 'create_category' %}" class="btn btn-success">Створення категорії</a>
            <a href="{% url 'category_list' %}" class="btn btn-warning">Список категорій</a>

            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Вихід</button>
            </form>
        {% else %}
            <a href="{% url 'register' %}" class="btn btn-primary">Реєстрація</a>
            <a href="{% url 'login' %}" class="btn btn-success">Логін</a>
        {% endif %}
    </div>

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}

</body>
</html>
